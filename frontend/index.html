<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>点云项目工作台 / Point Cloud Workbench</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="project-shell" aria-label="点云项目工作台">
      <section class="hero-panel" aria-labelledby="project-title">
        <div class="project-heading">
          <p class="eyebrow">Point Cloud Platform</p>
          <h1 id="project-title">点云项目工作台</h1>
          <p id="project-summary" class="summary-line">加载项目状态...</p>
        </div>
        <div class="project-metrics" aria-label="项目指标">
          <div class="metric-block">
            <span class="metric-label">资产</span>
            <strong id="metric-assets">-</strong>
          </div>
          <div class="metric-block">
            <span class="metric-label">点数</span>
            <strong id="metric-points">-</strong>
          </div>
          <div class="metric-block">
            <span class="metric-label">阶段</span>
            <strong id="metric-phases">-</strong>
          </div>
        </div>
      </section>

      <section class="workspace-grid">
        <section class="viewport-panel" aria-labelledby="preview-title">
          <div class="section-title-row">
            <div>
              <p class="eyebrow">Preview</p>
              <h2 id="preview-title">点云视窗</h2>
            </div>
            <span id="asset-format" class="status-chip">LAS/LAZ</span>
          </div>
          <canvas id="project-preview" width="920" height="520" aria-label="点云预览画布"></canvas>
          <div id="asset-detail" class="asset-detail"></div>
        </section>

        <aside class="side-panel" aria-label="项目侧栏">
          <section class="info-card" aria-labelledby="asset-title">
            <p class="eyebrow">Asset</p>
            <h2 id="asset-title">资产总览</h2>
            <dl id="asset-facts" class="fact-list"></dl>
          </section>

          <section class="info-card" aria-labelledby="reports-title">
            <p class="eyebrow">Reports</p>
            <h2 id="reports-title">报告入口</h2>
            <div id="report-list" class="report-list"></div>
          </section>
        </aside>
      </section>

      <section class="workflow-panel" aria-labelledby="workflow-title">
        <div class="section-title-row">
          <div>
            <p class="eyebrow">Workflow</p>
            <h2 id="workflow-title">生产流程</h2>
          </div>
          <span id="workflow-ready" class="status-chip">检查中</span>
        </div>
        <div id="workflow-list" class="workflow-list"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
